<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceKhaata — Smart Expense Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 32px;
      text-align: center;
    }
    .logo { font-size: 64px; margin-bottom: 24px; }
    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .accent { color: #00FFC6; }
    p { color: #666; font-size: 16px; line-height: 1.6; max-width: 360px; }
    .badge {
      margin-top: 40px;
      display: inline-block;
      background: #00FFC6;
      color: #000;
      font-weight: 800;
      font-size: 15px;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">💸</div>
  <h1>Voice<span class="accent">Khaata</span></h1>
  <p>Track expenses by voice. Split trips with friends. Never do math again.</p>
  <a class="badge" href="https://play.google.com/store">Download on Google Play</a>
</body>
</html>
