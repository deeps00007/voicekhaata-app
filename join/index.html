<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joining VoiceKhaata Group…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p  { color: #888; font-size: 15px; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #00FFC6;
      color: #000;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 40px;
      border-radius: 16px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .sub { color: #555; font-size: 13px; }
  </style>
  <script>
    // Grab the groupId from the query string and redirect into the app
    (function () {
      var params = new URLSearchParams(window.location.search);
      var groupId = params.get('groupId');
      if (groupId) {
        // Try to open the app
        window.location.href = 'voicekhaata://join?groupId=' + encodeURIComponent(groupId);
        // Fallback after 2s — show the manual button
        setTimeout(function () {
          document.getElementById('manual').style.display = 'block';
        }, 2000);
      } else {
        document.getElementById('no-id').style.display = 'block';
      }
    })();
  </script>
</head>
<body>
  <div class="logo">💸</div>
  <h1>Opening VoiceKhaata…</h1>
  <p>You've been invited to a group.<br/>The app should open automatically.</p>

  <!-- Shown after 2s if app didn't open -->
  <div id="manual" style="display:none;">
    <script>
      // Re-insert the button with correct link
      document.write(
        '<a class="btn" href="voicekhaata://join?groupId=' +
        new URLSearchParams(window.location.search).get('groupId') +
        '">Open in VoiceKhaata</a><br/>'
      );
    </script>
    <p class="sub">If the button doesn't work, make sure VoiceKhaata is installed.</p>
  </div>

  <div id="no-id" style="display:none;">
    <p>This link looks invalid. Ask your friend to reshare the invite.</p>
  </div>
</body>
</html>
