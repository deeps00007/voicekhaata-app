<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joining VoiceKhaata Group…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p  { color: #888; font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #00FFC6;
      color: #000;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 40px;
      border-radius: 16px;
      text-decoration: none;
      margin-bottom: 16px;
      transition: transform 0.15s;
    }
    .btn:active { transform: scale(0.95); }
    .sub { color: #555; font-size: 13px; margin-top: 8px; }
    .group-id { color: #00FFC6; font-weight: 700; word-break: break-all; }
  </style>
</head>
<body>
  <div class="logo">💸</div>
  <h1>Join VoiceKhaata Group</h1>
  <p>You've been invited to a group.<br/>Tap the button below to open the app.</p>

  <div id="open-section">
    <!-- This link uses Chrome's intent:// format which ACTUALLY works on Android -->
    <a id="open-btn" class="btn" href="#">Open in VoiceKhaata</a>
    <p class="sub">Make sure VoiceKhaata is installed on your phone.</p>
  </div>

  <div id="no-id" style="display:none;">
    <p>⚠️ This link looks invalid.<br/>Ask your friend to reshare the invite.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var groupId = params.get('groupId');

      if (!groupId) {
        document.getElementById('open-section').style.display = 'none';
        document.getElementById('no-id').style.display = 'block';
        return;
      }

      // Build the Android Intent URL — this is the ONLY format Chrome respects.
      // Format: intent://HOST/PATH?params#Intent;scheme=SCHEME;package=PKG;end
      var intentUrl = 'intent://join?groupId=' + encodeURIComponent(groupId)
        + '#Intent'
        + ';scheme=voicekhaata'
        + ';package=com.voicekhaata.app'
        + ';end';

      document.getElementById('open-btn').href = intentUrl;
    })();
  </script>
</body>
</html>
